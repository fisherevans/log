## Pages CMS configuration. See https://pagescms.org/docs/configuration/
## This file is the single source of truth Pages CMS reads when you
## open the repo at app.pagescms.org.

media:
  ## Local fallback for in-repo media. The intended media flow is the bot's
  ## `!upload` command in #ops which pushes to R2 and returns a
  ## media.fisher.sh URL - paste that URL directly into the post body.
  ## This input/output is only for occasional small images that don't go
  ## through R2 (favicons, etc.).
  input: src/assets/uploads
  output: /assets/uploads

content:
  - name: tags
    label: Tags
    path: src/content/tags
    type: collection
    filename: "{slug}.yaml"
    format: yaml
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: description
        label: Description
        type: string

  - name: posts
    label: Posts
    path: src/content/posts
    type: collection
    format: yaml-frontmatter
    filename: '{primary}.md'
    view:
      fields: [title, date, tags, draft]
      sort: [{ field: date, direction: desc }]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: 'yyyy-MM-dd'
      - name: description
        label: Description (used in RSS + summary listings)
        type: text
      - name: tags
        label: Tags (groups under /tags/<tag>/)
        type: string
        list: true
      - name: hasVideo
        label: Has Video
        type: boolean
        default: false
      - name: heroImage
        label: Hero Image (optional)
        type: image
      - name: updatedDate
        label: Updated Date (optional)
        type: date
        options:
          format: 'yyyy-MM-dd'
      - name: draft
        label: Draft (hide from listings + RSS)
        type: boolean
        default: false
      - name: body
        label: Body
        # Plain markdown source editor, NOT rich-text. The rich-text WYSIWYG
        # round-trips the body through a model that drops raw HTML (<iframe>
        # embeds) and backslash escapes - it silently stripped 29 embeds +
        # text on 2026-06-03 (nottingham-cloud#118). `code` edits the body as
        # faithful source. Pages CMS keys the body off the field NAME `body`,
        # so the type only changes the editor widget, not the data. scribe
        # binds `body` by name too and uses its own editor - unaffected.
        type: code
        options:
          language: markdown

  - name: about
    label: About page
    path: src/pages/about.astro
    type: file
    fields:
      - name: body
        label: Page content (warning - this is an Astro file, edit with care)
        type: code
        options:
          language: astro

settings:
  primary: posts
