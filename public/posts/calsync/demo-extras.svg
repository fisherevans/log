  <text x="100" y="124" font-size="14" font-weight="600" fill="#24292f">Project Review</text>
  <text x="100" y="146" font-size="11" fill="#57606a">&#128205; Banana - 4th floor</text>
  <text x="100" y="167" font-size="11" fill="#1f6feb" text-decoration="underline">zoom.us/j/88213</text>

  <!-- arrow -->
  <line x1="330" y1="144" x2="628" y2="144" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="442" y="132" width="72" height="24" rx="12" fill="#1f6feb"/>
  <text x="478" y="148" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">mirror</text>
  <text x="478" y="174" font-size="11" fill="#57606a" text-anchor="middle">room + join link kept</text>

  <!-- target: same room, on personal -->
