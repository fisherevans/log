      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="940" height="200" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>

  <text x="40" y="48" font-size="17" font-weight="700" fill="#1f6feb">EXTRAS<tspan font-size="13" font-weight="400" fill="#57606a">&#160;&#160;&#160;carry the room and join link onto your phone</tspan></text>

