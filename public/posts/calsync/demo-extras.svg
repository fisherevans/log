  <text x="760" y="84" font-size="11" font-weight="600" fill="#57606a" text-anchor="middle" letter-spacing="0.5">PERSONAL CALENDAR &#183; ON YOUR PHONE</text>

  <!-- source: work meeting with room + zoom -->
  <rect x="80" y="98" width="240" height="92" rx="8" fill="#e7effb" stroke="#aac4ee"/>
