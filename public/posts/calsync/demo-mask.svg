<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="940" height="200" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>

  <text x="40" y="48" font-size="17" font-weight="700" fill="#bf8700">MASK<tspan font-size="13" font-weight="400" fill="#57606a">&#160;&#160;&#160;show that you're busy, leak nothing</tspan></text>

  <text x="200" y="84" font-size="11" font-weight="600" fill="#57606a" text-anchor="middle" letter-spacing="0.5">PERSONAL CALENDAR</text>
  <text x="760" y="84" font-size="11" font-weight="600" fill="#57606a" text-anchor="middle" letter-spacing="0.5">WORK CALENDAR</text>

  <!-- source: a personal event with real details -->
  <rect x="80" y="98" width="240" height="92" rx="8" fill="#fbf0d9" stroke="#e3c270"/>
  <rect x="80" y="98" width="5" height="92" rx="2.5" fill="#d29922"/>
  <text x="100" y="124" font-size="14" font-weight="600" fill="#24292f">Dentist - Dr. Alvarez</text>
  <text x="100" y="146" font-size="11" fill="#7a6320">2:00 - 2:30 PM</text>
  <text x="100" y="167" font-size="11" fill="#7a6320">x-rays + cleaning</text>

  <!-- arrow -->
  <line x1="330" y1="144" x2="628" y2="144" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="442" y="132" width="72" height="24" rx="12" fill="#bf8700"/>
  <text x="478" y="148" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">mask</text>
  <text x="478" y="174" font-size="11" fill="#57606a" text-anchor="middle">title + details dropped</text>

  <!-- target: opaque busy block -->
  <rect x="640" y="98" width="240" height="92" rx="8" fill="#eaecef" stroke="#cdd2d8"/>
  <rect x="640" y="98" width="5" height="92" rx="2.5" fill="#8b949e"/>
  <text x="660" y="124" font-size="14" font-weight="600" fill="#24292f">Busy</text>
  <text x="660" y="146" font-size="11" fill="#6b7480">2:00 - 2:30 PM</text>
  <text x="660" y="167" font-size="11" font-style="italic" fill="#9aa3ad">no title, no notes</text>
</svg>
